<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Salty Sea Dog's Ship Spotter!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ocean:#1a6fa8;--ocean-dark:#0d4870;
  --sand:#ffe0a0;--sand-dark:#e8b84b;
  --red:#e74c3c;--green:#2ecc71;--yellow:#f1c40f;
  --white:#fffef5;--navy:#0d2b3e;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;background:#87ceeb;display:flex;flex-direction:column;height:100vh;touch-action:manipulation;}

/* WELCOME BANNER */
.welcome{
  background:linear-gradient(135deg,#0d4870,#1a6fa8);
  padding:10px 16px 10px;
  text-align:center;
  border-bottom:4px solid var(--sand-dark);
  flex-shrink:0;
  position:relative;
  overflow:hidden;
}
.welcome::before{
  content:'⭐ ⚓ ⭐ ⚓ ⭐ ⚓ ⭐ ⚓ ⭐ ⚓ ⭐ ⚓ ⭐';
  display:block;font-size:10px;color:rgba(255,220,100,0.4);
  letter-spacing:4px;margin-bottom:4px;
}
.welcome-text{
  font-family:'Fredoka One',cursive;
  font-size:22px;color:var(--yellow);
  text-shadow:2px 2px 0 var(--navy);
  animation:bob 2s ease-in-out infinite;
  display:inline-block;
}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}

/* HEADER */
.header{background:var(--ocean-dark);padding:8px 14px;flex-shrink:0;border-bottom:5px solid var(--sand-dark);display:flex;align-items:center;gap:10px;}
.mascot{font-size:36px;flex-shrink:0;animation:bob 2s ease-in-out infinite;animation-delay:0.3s;}
.title-wrap{flex:1;min-width:0;}
.title{font-family:'Fredoka One',cursive;font-size:19px;color:var(--yellow);line-height:1.1;text-shadow:2px 2px 0 var(--navy);}
.byline{font-size:10px;color:var(--sand);font-weight:700;letter-spacing:0.06em;opacity:0.85;}
.subtitle{font-size:10px;color:var(--sand);margin-top:2px;font-weight:700;display:flex;align-items:center;gap:5px;}
.ship-bubble{background:var(--yellow);border-radius:50%;width:50px;height:50px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px solid var(--sand-dark);}
.ship-bubble .num{font-family:'Fredoka One',cursive;font-size:22px;color:var(--navy);line-height:1;}
.ship-bubble .lbl{font-size:9px;color:var(--navy);font-weight:700;text-transform:uppercase;}

#map{width:100%;flex-shrink:0;background:var(--ocean);}

.panel{flex:1;overflow-y:auto;background:var(--white);border-top:4px dashed var(--sand-dark);padding-bottom:20px;}
.section-title{font-family:'Fredoka One',cursive;font-size:17px;color:var(--navy);padding:10px 14px 6px;border-bottom:2px dashed var(--sand-dark);background:var(--sand);display:flex;align-items:center;gap:8px;}

.ship-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:2px solid var(--sand);cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,0.08);}
.ship-card:active{background:rgba(26,111,168,0.1);}
.ship-emoji-big{font-size:34px;flex-shrink:0;animation:bob 3s ease-in-out infinite;}
.ship-name-big{font-family:'Fredoka One',cursive;font-size:17px;color:var(--navy);}
.ship-type-tag{display:inline-block;background:var(--ocean);color:var(--white);border-radius:20px;font-size:11px;font-weight:700;padding:2px 10px;margin-top:3px;}
.ship-dist-big{margin-left:auto;text-align:center;flex-shrink:0;}
.ship-dist-big .nm{font-family:'Fredoka One',cursive;font-size:20px;color:var(--red);}
.ship-dist-big .away{font-size:10px;color:var(--ocean);font-weight:700;}

.empty-panel{text-align:center;padding:24px 16px;color:var(--ocean);}
.empty-panel .big-e{font-size:44px;display:block;margin-bottom:8px;}
.empty-panel p{font-family:'Fredoka One',cursive;font-size:17px;}

.watch-card{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:2px solid var(--sand);}
.watch-name{font-family:'Fredoka One',cursive;font-size:15px;color:var(--navy);flex:1;}
.spotted-badge{background:var(--green);color:white;border-radius:20px;font-size:11px;font-weight:700;padding:3px 10px;}
.looking-badge{background:var(--sand-dark);color:var(--white);border-radius:20px;font-size:11px;font-weight:700;padding:3px 10px;}
.del-btn{background:var(--red);color:white;border:none;border-radius:50%;width:28px;height:28px;font-size:15px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}

.add-watch-row{display:flex;gap:8px;padding:10px 14px;background:var(--sand);border-top:2px dashed var(--sand-dark);}
.add-watch-row input{flex:1;border:3px solid var(--sand-dark);border-radius:8px;padding:9px 12px;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;background:var(--white);color:var(--navy);outline:none;}
.add-watch-row input:focus{border-color:var(--ocean);}
.add-btn{background:var(--ocean);color:var(--yellow);border:none;border-radius:8px;padding:9px 14px;font-family:'Fredoka One',cursive;font-size:15px;cursor:pointer;flex-shrink:0;}
.add-btn:active{background:var(--ocean-dark);}

.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,40,80,0.7);z-index:9000;align-items:flex-end;justify-content:center;}
.popup-overlay.open{display:flex;}
.popup-card{background:var(--white);border-radius:24px 24px 0 0;border:4px solid var(--sand-dark);border-bottom:none;padding:20px 20px 32px;width:100%;max-width:480px;animation:slideup 0.3s cubic-bezier(0.175,0.885,0.32,1.275);}
@keyframes slideup{from{transform:translateY(100%);}to{transform:translateY(0);}}
.popup-name{font-family:'Fredoka One',cursive;font-size:24px;color:var(--navy);margin-bottom:4px;}
.popup-emoji{font-size:44px;display:block;text-align:center;margin:8px 0;}
.popup-comment{background:var(--sand);border-radius:12px;padding:10px 14px;font-size:14px;font-weight:700;color:var(--navy);text-align:center;margin-bottom:12px;border:2px dashed var(--sand-dark);}
.popup-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--sand-dark);font-size:13px;}
.popup-row:last-of-type{border-bottom:none;}
.popup-val{font-weight:700;color:var(--navy);}
.popup-btns{display:flex;gap:8px;margin-top:14px;}
.popup-btns button{flex:1;padding:12px;border:none;border-radius:10px;font-family:'Fredoka One',cursive;font-size:15px;cursor:pointer;}
.btn-watch{background:var(--ocean);color:var(--yellow);}
.btn-close{background:var(--sand-dark);color:var(--white);}

.alert-overlay{display:none;position:fixed;inset:0;background:rgba(0,40,80,0.85);z-index:9999;align-items:center;justify-content:center;padding:20px;}
.alert-overlay.open{display:flex;}
.alert-card{background:var(--white);border-radius:24px;border:5px solid var(--yellow);padding:28px 24px;max-width:340px;width:100%;text-align:center;animation:alert-pop 0.4s cubic-bezier(0.175,0.885,0.32,1.275);}
@keyframes alert-pop{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}
.alert-bell{font-size:50px;display:block;margin-bottom:8px;animation:ring 0.8s ease-in-out 4;}
@keyframes ring{0%,100%{transform:rotate(0);}25%{transform:rotate(-20deg);}75%{transform:rotate(20deg);}}
.alert-headline{font-family:'Fredoka One',cursive;font-size:26px;color:var(--red);margin-bottom:4px;}
.alert-ship{font-family:'Fredoka One',cursive;font-size:30px;color:var(--navy);margin:6px 0;}
.alert-quip{font-size:15px;font-weight:700;color:var(--ocean);margin-bottom:16px;}
.alert-ack{background:var(--yellow);border:3px solid var(--sand-dark);border-radius:16px;font-family:'Fredoka One',cursive;font-size:19px;padding:14px 28px;cursor:pointer;color:var(--navy);width:100%;}

.conn-dot{width:9px;height:9px;border-radius:50%;background:var(--red);display:inline-block;flex-shrink:0;}
.conn-dot.live{background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* PHOENIX MAP MARKER */
.phoenix-marker{
  display:flex;flex-direction:column;align-items:center;
  filter:drop-shadow(2px 3px 4px rgba(0,0,0,0.4));
}
.phoenix-photo{
  width:52px;height:52px;border-radius:50%;
  border:3px solid var(--yellow);
  background:var(--sand);
  overflow:hidden;
  display:block;
}
.phoenix-photo img{width:100%;height:100%;object-fit:cover;}
.phoenix-flag-pole{width:3px;height:18px;background:var(--rope, #8a6020);margin:0 auto;}
.phoenix-label{
  background:var(--yellow);
  color:var(--navy);
  font-family:'Fredoka One',cursive;
  font-size:11px;
  padding:2px 8px;
  border-radius:10px;
  border:2px solid var(--sand-dark);
  white-space:nowrap;
  margin-top:2px;
}
</style>
</head>
<body>

<div class="alert-overlay" id="alertOverlay">
  <div class="alert-card">
    <span class="alert-bell">🔔</span>
    <div class="alert-headline">SHIP AHOY!!</div>
    <div class="alert-ship" id="aShipName"></div>
    <div class="alert-quip" id="aQuip"></div>
    <button class="alert-ack" onclick="dismissAlert()">I SEE IT! 👀</button>
  </div>
</div>

<div class="popup-overlay" id="popupOverlay" onclick="closePopup(event)">
  <div class="popup-card">
    <span class="popup-emoji" id="pEmoji"></span>
    <div class="popup-name" id="pName"></div>
    <div class="popup-comment" id="pComment"></div>
    <div id="pRows"></div>
    <div class="popup-btns">
      <button class="btn-watch" id="pWatchBtn">+ Watch this ship!</button>
      <button class="btn-close" onclick="closePopup()">Close</button>
    </div>
  </div>
</div>

<div class="welcome">
  <div class="welcome-text">Ahoy Phoenix! 🏴‍☠️⚓🐶</div>
</div>

<div class="header">
  <div class="mascot">🐶</div>
  <div class="title-wrap">
    <div class="title">Salty Sea Dog's Ship Spotter!</div>
    <div class="byline">by Uncle Chris ⚓</div>
    <div class="subtitle">
      <span class="conn-dot" id="connDot"></span>
      <span id="connTxt">Connecting...</span>
    </div>
  </div>
  <div class="ship-bubble">
    <span class="num" id="shipNum">0</span>
    <span class="lbl">ships!</span>
  </div>
</div>

<div id="map"></div>

<div class="panel">
  <div class="section-title">🚢 Ships nearby!</div>
  <div id="shipList"><div class="empty-panel"><span class="big-e">🌊</span><p>Looking for ships...</p></div></div>
  <div class="section-title">👁 My Watch List</div>
  <div id="watchList"></div>
  <div class="empty-panel" id="watchEmpty" style="padding:16px"><span class="big-e" style="font-size:28px">🔭</span><p style="font-size:14px">Add a ship to watch for!</p></div>
  <div class="add-watch-row">
    <input type="text" id="watchInput" placeholder="Type a ship name..." />
    <button class="add-btn" onclick="addWatch()">+ Add</button>
  </div>
</div>

const EMOJIS = {60:'⛴️',61:'⛴️',70:'🚢',71:'🚢',72:'🚢',80:'🛢️',81:'🛢️',30:'🎣',31:'⚓',32:'⚓',36:'⛵',37:'⛵',50:'🚤',51:'🆘',52:'⚓',0:'🚢'};
const LABELS = {60:'Ferry',61:'Ferry',70:'Cargo Ship',71:'Cargo Ship',72:'Cargo Ship',80:'Tanker',81:'Tanker',30:'Fishing Boat',31:'Tugboat',32:'Tugboat',36:'Sailing Boat',37:'Pleasure Boat',50:'Pilot Boat',51:'Rescue Boat',52:'Tugboat',0:'Mystery Ship'};
const QUIPS = {
  60:["Full of people going on holiday!","TOOT TOOT! The ferry!","Can you count all the windows?","Wave at it! Maybe they'll see you!","That's the Isle of Wight ferry — Daddy might know the captain!"],
  70:["It's HUGE! What's inside?","Maybe it's full of toys!","That thing is longer than our whole street!","Carrying goodies from far away!"],
  80:["A big oil tanker — very smelly!","Full of oil. Don't crash into it!","Goes really slowly because it's SO heavy."],
  36:["Whoosh! Flying on the wind!","No engine — just sails! Like a pirate ship!","ARRR! Hoist the mainsail!"],
  51:["HEROES! Out to save someone!","Make way! Rescue boat coming through!","Those are the good guys!"],
  30:["Out looking for fish!","Maybe they'll catch a big one today!"],
  0:["What IS that thing?!","A mystery ship! Very suspicious.","It's a SECRET mission. Probably.","Who goes there?! Friend or foe?!"]
};

function emo(t){const b=Math.floor((t||0)/10)*10;return EMOJIS[t]||EMOJIS[b]||'🚢';}
function lbl(t){const b=Math.floor((t||0)/10)*10;return LABELS[t]||LABELS[b]||'Mystery Ship';}
function quip(t){const b=Math.floor((t||0)/10)*10;const a=QUIPS[t]||QUIPS[b]||QUIPS[0];return a[Math.floor(Math.random()*a.length)];}
function hav(la1,lo1,la2,lo2){const R=3440.065,r=Math.PI/180,a=Math.sin((la2-la1)*r/2)**2+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin((lo2-lo1)*r/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

const ships={}, markers={};
let watchList=JSON.parse(localStorage.getItem('samWatch')||'[]');
let alerted={}, alertQ=[], ws, map;

function setMapHeight(){document.getElementById('map').style.height=Math.round(window.innerHeight*0.40)+'px';}
window.addEventListener('resize',setMapHeight);
setMapHeight();

function initMap(){
  map=L.map('map',{center:[HOME.lat,HOME.lng],zoom:13,zoomControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; OpenStreetMap contributors &copy; CARTO',maxZoom:19
  }).addTo(map);

  L.circle([HOME.lat,HOME.lng],{radius:5*1852,color:'#1a6fa8',weight:1.5,fill:false,dashArray:'6,8',opacity:0.5}).addTo(map);
  L.circle([HOME.lat,HOME.lng],{radius:ALERT_NM*1852,color:'#e74c3c',weight:2,fill:true,fillColor:'#e74c3c',fillOpacity:0.06,dashArray:'3,5'}).addTo(map);

  // Phoenix marker -- theatrical
  const phoenixIcon = L.divIcon({
    html: `<div class="phoenix-marker">
      <div class="phoenix-photo"><img src="${PHOENIX_IMG}" alt="Phoenix"/></div>
      <div class="phoenix-flag-pole"></div>
      <div class="phoenix-label">⚓ Phoenix's HQ ⚓</div>
    </div>`,
    className: '',
    iconSize: [120, 90],
    iconAnchor: [60, 10]
  });

  L.marker([HOME.lat, HOME.lng], {icon: phoenixIcon})
    .addTo(map)
    .bindPopup('<b style="font-family:Fredoka One,cursive;font-size:16px;color:#0d2b3e">Phoenix\'s Ship Watching HQ! 🏴‍☠️</b>');
}

function mkIcon(s){return L.divIcon({html:`<div style="font-size:24px;line-height:1;transform:rotate(${s.heading??s.cog??0}deg)">${emo(s.type||0)}</div>`,className:'',iconSize:[26,26],iconAnchor:[13,13]});}

function updMarker(mmsi){
  const s=ships[mmsi];if(!s?.lat||!s?.lng)return;
  if(markers[mmsi]){markers[mmsi].setLatLng([s.lat,s.lng]).setIcon(mkIcon(s));}
  else{markers[mmsi]=L.marker([s.lat,s.lng],{icon:mkIcon(s)}).addTo(map).on('click',()=>showPopup(mmsi));}
  markers[mmsi].bindTooltip(`<b>${s.name||'Unknown'}</b>`,{direction:'top',offset:[0,-10]});
}

function showPopup(mmsi){
  const s=ships[mmsi];if(!s)return;
  document.getElementById('pEmoji').textContent=emo(s.type||0);
  document.getElementById('pName').textContent=s.name||'Mystery Ship!';
  document.getElementById('pComment').textContent=quip(s.type||0);
  document.getElementById('pRows').innerHTML=[
    ['What is it?',lbl(s.type||0)],
    ['How far away?',s.dist?s.dist.toFixed(2)+' nautical miles':'—'],
    ['How fast?',s.sog!=null?s.sog.toFixed(1)+' knots':'—'],
    ['Going to?',s.dest||'somewhere secret...']
  ].map(([k,v])=>`<div class="popup-row"><span>${k}</span><span class="popup-val">${v}</span></div>`).join('');
  const wn=s.name||String(mmsi);
  document.getElementById('pWatchBtn').onclick=()=>{addWatchItem(wn);closePopup();};
  document.getElementById('popupOverlay').classList.add('open');
}

function closePopup(e){if(e&&e.target!==document.getElementById('popupOverlay'))return;document.getElementById('popupOverlay').classList.remove('open');}

function renderShips(){
  const sorted=Object.values(ships).filter(s=>s.lat&&s.lng&&s.dist!=null).sort((a,b)=>a.dist-b.dist);
  document.getElementById('shipNum').textContent=sorted.length;
  const el=document.getElementById('shipList');
  if(!sorted.length){el.innerHTML='<div class="empty-panel"><span class="big-e">🌊</span><p>Looking for ships...</p></div>';return;}
  el.innerHTML=sorted.map(s=>`<div class="ship-card" onclick="showPopup('${s.mmsi}')">
    <span class="ship-emoji-big">${emo(s.type||0)}</span>
    <div><div class="ship-name-big">${s.name||'Mystery Ship'}</div><span class="ship-type-tag">${lbl(s.type||0)}</span></div>
    <div class="ship-dist-big"><div class="nm">${s.dist.toFixed(1)}</div><div class="away">nm away</div></div>
  </div>`).join('');
}

function renderWatch(){
  const el=document.getElementById('watchList');
  document.getElementById('watchEmpty').style.display=watchList.length?'none':'block';
  el.innerHTML=watchList.map((w,i)=>{
    const m=Object.values(ships).find(s=>(s.name&&s.name.toUpperCase().includes(w.toUpperCase()))||String(s.mmsi)===w);
    return`<div class="watch-card"${m?` onclick="showPopup('${m.mmsi}')"`:''}>
      <span style="font-size:20px">${m?'👀':'🔭'}</span>
      <span class="watch-name">${w}</span>
      ${m?`<span class="spotted-badge">Spotted! ${m.dist?m.dist.toFixed(1)+'nm':''}</span>`:`<span class="looking-badge">Looking...</span>`}
      <button class="del-btn" onclick="event.stopPropagation();rmWatch(${i})">✕</button>
    </div>`;
  }).join('');
}

function addWatch(){addWatchItem(document.getElementById('watchInput').value.trim());document.getElementById('watchInput').value='';}
function addWatchItem(v){if(!v||watchList.includes(v))return;watchList.push(v);localStorage.setItem('samWatch',JSON.stringify(watchList));renderWatch();}
function rmWatch(i){watchList.splice(i,1);localStorage.setItem('samWatch',JSON.stringify(watchList));renderWatch();}
document.getElementById('watchInput').addEventListener('keydown',e=>{if(e.key==='Enter')addWatch();});

function checkAlerts(mmsi){
  const s=ships[mmsi];if(!s?.name)return;
  const w=watchList.some(w=>(s.name&&s.name.toUpperCase().includes(w.toUpperCase()))||String(s.mmsi)===w);
  if(w&&s.dist!=null&&s.dist<=ALERT_NM&&!alerted[mmsi]){alerted[mmsi]=true;alertQ.push(s);if(alertQ.length===1)fireAlert();}
  if(s.dist>ALERT_NM*2)delete alerted[mmsi];
}

function fireAlert(){
  if(!alertQ.length)return;const s=alertQ[0];
  document.getElementById('aShipName').textContent=s.name||'Mystery Ship';
  document.getElementById('aQuip').textContent=quip(s.type||0);
  document.getElementById('alertOverlay').classList.add('open');
  if(Notification.permission==='granted')new Notification('SHIP AHOY! 🔔',{body:`${s.name||'A ship'} is right outside!`});
}

function dismissAlert(){document.getElementById('alertOverlay').classList.remove('open');alertQ.shift();if(alertQ.length)setTimeout(fireAlert,600);}

function setConn(on){
  document.getElementById('connDot').className='conn-dot'+(on?' live':'');
  document.getElementById('connTxt').textContent=on?'Ships coming in!':'Reconnecting...';
}

function connect(){
  ws=new WebSocket('wss://stream.aisstream.io/v0/stream');
  ws.onopen=()=>{
    ws.send(JSON.stringify({APIKey:API_KEY,BoundingBoxes:[[[BBOX[0][0],BBOX[0][1]],[BBOX[1][0],BBOX[1][1]]]],FilterMessageTypes:['PositionReport','ShipStaticData']}));
    setConn(true);
  };
  ws.onmessage=async(ev)=>{
    try{
      const raw=ev.data instanceof Blob?await ev.data.text():ev.data;
      const msg=JSON.parse(raw),meta=msg.MetaData||{};
      const mmsi=String(meta.MMSI||'');if(!mmsi)return;
      if(!ships[mmsi])ships[mmsi]={mmsi};
      if(msg.MessageType==='PositionReport'){
        const p=msg.Message?.PositionReport||{};
        ships[mmsi].lat=meta.latitude||p.Latitude;
        ships[mmsi].lng=meta.longitude||p.Longitude;
        ships[mmsi].sog=p.Sog;ships[mmsi].cog=p.Cog;
        ships[mmsi].heading=p.TrueHeading!==511?p.TrueHeading:null;
        ships[mmsi].name=ships[mmsi].name||(meta.ShipName||'').trim()||undefined;
      }
      if(msg.MessageType==='ShipStaticData'){
        const s=msg.Message?.ShipStaticData||{};
        ships[mmsi].name=((s.Name||meta.ShipName)||'').trim()||ships[mmsi].name;
        ships[mmsi].type=s.Type;
        ships[mmsi].dest=(s.Destination||'').trim();
        if(!ships[mmsi].lat)ships[mmsi].lat=meta.latitude;
        if(!ships[mmsi].lng)ships[mmsi].lng=meta.longitude;
      }
      if(ships[mmsi].lat&&ships[mmsi].lng){
        ships[mmsi].dist=hav(HOME.lat,HOME.lng,ships[mmsi].lat,ships[mmsi].lng);
        updMarker(mmsi);checkAlerts(mmsi);
      }
      renderShips();renderWatch();
    }catch(e){console.warn(e);}
  };
  ws.onclose=()=>{setConn(false);setTimeout(connect,8000);};
  ws.onerror=()=>setConn(false);
}

initMap();connect();renderWatch();
</script>
